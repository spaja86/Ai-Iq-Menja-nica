version: '3.8'

services:
  # Development database (SQLite is default, use this for PostgreSQL)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: changeme123
      POSTGRES_DB: aiiq_exchange
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DATABASE_URL=sqlite:///./exchange.db
      # Uncomment for PostgreSQL:
      # - POSTGRES_SERVER=db
      # - POSTGRES_USER=exchange
      # - POSTGRES_PASSWORD=changeme123
      # - POSTGRES_DB=aiiq_exchange
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev_secret_key_change_in_production
    volumes:
      - ./backend/app:/app/app
      - sqlite_data:/app
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
  sqlite_data:
