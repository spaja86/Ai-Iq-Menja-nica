<html>
<head>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="trade-ui">
        <h2>Market Trade UI</h2>
        <button onclick="setMode('BUY')">BUY</button>
        <button onclick="setMode('SELL')">SELL</button>
        <select>
            <option value="RSD">Fiat: RSD</option>
            <option value="EUR">Fiat: EUR</option>
        </select>
        <div id="search-area">
            <input type="text" id="search" placeholder="Search coins...">
            <button id="load-more">Load More</button>
        </div>
        <div id="results">
            <!-- Results will be displayed here -->
        </div>
    </div>
    <script src="js/trade.js"></script>
</body>
</html>
