apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-exchange-backend
  labels:
    app: crypto-exchange
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: crypto-exchange
      component: backend
  template:
    metadata:
      labels:
        app: crypto-exchange
        component: backend
    spec:
      containers:
      - name: backend
        image: crypto-exchange-backend:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: crypto-exchange-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: crypto-exchange-config
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: crypto-exchange-secrets
              key: secret-key
        envFrom:
        - configMapRef:
            name: crypto-exchange-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-exchange-frontend
  labels:
    app: crypto-exchange
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crypto-exchange
      component: frontend
  template:
    metadata:
      labels:
        app: crypto-exchange
        component: frontend
    spec:
      containers:
      - name: frontend
        image: crypto-exchange-frontend:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
