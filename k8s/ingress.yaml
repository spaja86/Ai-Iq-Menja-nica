apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crypto-exchange-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/websocket-services: crypto-exchange-backend
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
  - hosts:
    - api.aiiqexchange.com
    - app.aiiqexchange.com
    secretName: crypto-exchange-tls
  rules:
  - host: api.aiiqexchange.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: crypto-exchange-backend
            port:
              number: 8000
  - host: app.aiiqexchange.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: crypto-exchange-frontend
            port:
              number: 80
