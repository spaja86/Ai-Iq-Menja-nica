global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: [localhost:9093]

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'spaja-api'
    static_configs:
      - targets: ['localhost:7777']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
